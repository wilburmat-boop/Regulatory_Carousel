<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regulatory Carousel - The Dossier Loop</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #111122;
            --text: #d0d0e0;
            --accent: #ff6b6b;
            --gold: #f0c060;
            --purple: #b066ff;
            --red-dark: #cc3333;
            --cyan: #44dddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
            color: var(--text);
            padding: 10px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            max-width: 850px;
            width: 100%;
        }

        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .header h1 {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #ffe0c0;
            text-shadow: 0 0 30px rgba(255, 150, 60, 0.5);
            line-height: 1.2;
        }
        .header .subtitle {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: #998;
            text-transform: uppercase;
        }

        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            box-shadow:
                0 0 60px rgba(180, 100, 255, 0.15),
                0 0 120px rgba(255, 80, 60, 0.08),
                inset 0 0 0 1px rgba(255, 255, 255, 0.03);
            overflow: hidden;
            background: radial-gradient(ellipse at center, #141428 30%, #0a0a16 70%);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .day-counter {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 10px 20px;
            text-align: center;
            min-width: 130px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .day-counter .days {
            font-size: 2rem;
            font-weight: 700;
            color: #ffaa44;
            letter-spacing: 0.02em;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 140, 40, 0.6);
        }
        .day-counter .label {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: #887;
            text-transform: uppercase;
        }
        .status-tag {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 8px 16px;
            font-size: 0.75rem;
            letter-spacing: 0.03em;
            color: #ccc;
            text-align: center;
            max-width: 300px;
            transition: all 0.4s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        .status-tag .gate-name {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .status-tag.flash {
            animation: statusPulse 0.6s ease-out;
        }
        @keyframes statusPulse {
            0%,
            100% {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            }
            50% {
                box-shadow: 0 4px 40px rgba(255, 100, 60, 0.7);
                border-color: rgba(255, 120, 60, 0.7);
            }
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            font-size: 0.65rem;
            letter-spacing: 0.03em;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .legend-dot.type1 {
            background: #ff7043;
            box-shadow: 0 0 10px #ff7043;
        }
        .legend-dot.type2 {
            background: #f0b040;
            box-shadow: 0 0 10px #f0b040;
        }
        .legend-dot.type3 {
            background: #9966dd;
            box-shadow: 0 0 10px #9966dd;
        }
        .legend-dot.type4 {
            background: #dd3344;
            box-shadow: 0 0 10px #dd3344;
        }

        @media (max-width: 500px) {
            .canvas-wrapper {
                max-width: 95vw;
            }
            .day-counter .days {
                font-size: 1.4rem;
            }
            .legend {
                gap: 4px;
                font-size: 0.55rem;
            }
            .legend-item {
                padding: 4px 8px;
                gap: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ The Regulatory Carousel</h1>
            <div class="subtitle">A Closed-Loop Machine of Non-Accountability</div>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="carouselCanvas"></canvas>
        </div>

        <div class="info-bar">
            <div class="day-counter">
                <div class="days" id="dayCount">0</div>
                <div class="label">Days Pending</div>
            </div>
            <div class="status-tag" id="statusTag">
                <span class="gate-name">—</span><br>
                <span class="gate-detail">Dossier entering the system...</span>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="legend-dot type1"></span> Gate 1: "Not Us" — Jurisdictional Deflection</div>
            <div class="legend-item"><span class="legend-dot type2"></span> Gate 2: "Not Best Placed" — Institutional Inertia</div>
            <div class="legend-item"><span class="legend-dot type3"></span> Gate 3: "Null Space" — Technical Black Hole</div>
            <div class="legend-item"><span class="legend-dot type4"></span> Gate 4: "Hard Stop" — Active Obstruction</div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('carouselCanvas');
            const ctx = canvas.getContext('2d');
            const wrapper = document.getElementById('canvasWrapper');
            const dayCountEl = document.getElementById('dayCount');
            const statusTag = document.getElementById('statusTag');

            // --- Canvas sizing ---
            const SIZE = 700;
            let scale = 1;

            function resize() {
                const rect = wrapper.getBoundingClientRect();
                const w = rect.width;
                canvas.width = SIZE;
                canvas.height = SIZE;
                scale = w / SIZE;
                canvas.style.width = w + 'px';
                canvas.style.height = w + 'px';
            }
            resize();
            window.addEventListener('resize', resize);

            const CX = SIZE / 2;
            const CY = SIZE / 2;
            const TRACK_RADIUS = 230;

            // --- Station definitions ---
            // 8 stations, clockwise from top
            const stationDefs = [
                { id: 'CCMA', label: 'CCMA', angle: -Math.PI / 2, gateType: 1, gateName: 'Jurisdictional Gate',
                    detail: '"Not Us" — No PDA jurisdiction', fullDetail: 'Rejects citing lack of jurisdiction for PDA matters.' },
                { id: 'DEL', label: 'DEL', angle: -Math.PI / 4, gateType: 1, gateName: 'Jurisdictional Gate',
                    detail: '"Not Us" — Earnings Threshold §70(b)', fullDetail: 'Uses earnings threshold to assert lack of authority.' },
                { id: 'JSE', label: 'JSE', angle: 0, gateType: 1, gateName: 'Jurisdictional Gate',
                    detail: '"Not Us" — Listings Requirements', fullDetail: 'Claims matter falls outside their scope.' },
                { id: 'SAHRC', label: 'SAHRC', angle: Math.PI / 4, gateType: 2, gateName: '"Not Best Placed" Gate',
                    detail: 'Defers — "Not best placed" for victimization',
                    fullDetail: 'Acknowledges violations but defers to CCMA or Public Protector.' },
                { id: 'CMS', label: 'CMS', angle: Math.PI / 2, gateType: 2, gateName: '"Not Best Placed" Gate',
                    detail: 'Declines — Passes buck to HPCSA', fullDetail: 'Leaves patient safety risks unaddressed.' },
                { id: 'HPCSA', label: 'HPCSA/SAPC', angle: 3 * Math.PI / 4, gateType: 3, gateName: 'Technical/Access Gate',
                    detail: '"Null Space" — Unreachable servers', fullDetail: 'Systemic failure: invalid emails, no response.' },
                { id: 'LabCourt', label: 'Labour Court', angle: Math.PI, gateType: 4, gateName: 'Obstruction Gate',
                    detail: '"Hard Stop" — Obstructed filing process',
                    fullDetail: 'Poorly explained rejections force pending/rejection state.' },
                { id: 'SAPS', label: 'SAPS', angle: 5 * Math.PI / 4, gateType: 4, gateName: 'Obstruction Gate',
                    detail: '"Hard Stop" — Commander blocks case',
                    fullDetail: 'Station Commander refuses to open case without reviewing evidence.' },
            ];

            // Precompute station positions
            const stations = stationDefs.map((def, i) => ({
                ...def,
                index: i,
                x: CX + TRACK_RADIUS * Math.cos(def.angle),
                y: CY + TRACK_RADIUS * Math.sin(def.angle),
                labelX: CX + (TRACK_RADIUS + 48) * Math.cos(def.angle),
                labelY: CY + (TRACK_RADIUS + 48) * Math.sin(def.angle),
            }));

            // --- Gate type colors ---
            const gateColors = {
                1: { main: '#ff7043', glow: '#ff4400', particle: ['#ff7043', '#ff9966', '#ff4400', '#ffcc88'] },
                2: { main: '#f0b040', glow: '#e09820', particle: ['#f0b040', '#ffcc55', '#e8a020', '#ffd870'] },
                3: { main: '#9966dd', glow: '#7744cc', particle: ['#9966dd', '#bb88ee', '#7744cc', '#ccaaff'] },
                4: { main: '#dd3344', glow: '#bb1122', particle: ['#dd3344', '#ff5566', '#bb1122', '#ff7788'] },
            };

            // --- State ---
            let dossierAngle = stations[0].angle - 0.35; // Start just before first station
            let angularSpeed = 0.0008;
            let dayCount = 0;
            let visitedMask = 0; // bitmask of visited stations this lap
            let lapCount = 0;
            let particles = [];
            let trailPoints = [];
            const MAX_TRAIL = 55;
            let rejectionFlash = null; // { station, alpha, startTime }
            let shakeAmount = 0;
            let globalTime = 0;
            let lastStationTriggered = -1;
            let cooldownTimer = 0;

            // --- Particles ---
            function spawnParticles(station, count = 40) {
                const gc = gateColors[station.gateType];
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * 6;
                    const life = 0.6 + Math.random() * 1.6;
                    particles.push({
                        x: station.x,
                        y: station.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: life,
                        maxLife: life,
                        color: gc.particle[Math.floor(Math.random() * gc.particle.length)],
                        size: 1.2 + Math.random() * 3.5,
                    });
                }
                // Extra "spark" particles that go further
                for (let i = 0; i < 12; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 7 + Math.random() * 9;
                    particles.push({
                        x: station.x,
                        y: station.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 0.3 + Math.random() * 0.5,
                        maxLife: 0.5,
                        color: '#ffffff',
                        size: 0.6 + Math.random() * 1.8,
                    });
                }
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt * 60;
                    p.y += p.vy * dt * 60;
                    p.life -= dt;
                    p.vx *= 0.96;
                    p.vy *= 0.96;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const size = p.size * alpha;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = size * 4;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- Trail ---
            function updateTrail(dossierX, dossierY) {
                trailPoints.push({ x: dossierX, y: dossierY, life: 1.0 });
                if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
                for (const tp of trailPoints) tp.life -= 0.018;
                // Remove dead
                for (let i = trailPoints.length - 1; i >= 0; i--) {
                    if (trailPoints[i].life <= 0) trailPoints.splice(i, 1);
                }
            }

            function drawTrail(ctx) {
                if (trailPoints.length < 2) return;
                for (let i = 1; i < trailPoints.length; i++) {
                    const tp = trailPoints[i];
                    const prev = trailPoints[i - 1];
                    const alpha = tp.life * 0.7;
                    if (alpha <= 0.01) continue;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = '#ffcc88';
                    ctx.lineWidth = 2.5 * tp.life;
                    ctx.shadowColor = '#ff9944';
                    ctx.shadowBlur = 6 * tp.life;
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(tp.x, tp.y);
                    ctx.stroke();
                    ctx.restore();
                }
                // Glow dots at recent positions
                for (let i = Math.max(0, trailPoints.length - 15); i < trailPoints.length; i++) {
                    const tp = trailPoints[i];
                    const alpha = tp.life * 0.6;
                    if (alpha <= 0.01) continue;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = '#ffe0b0';
                    ctx.shadowColor = '#ff9944';
                    ctx.shadowBlur = 10 * tp.life;
                    ctx.beginPath();
                    ctx.arc(tp.x, tp.y, 2.5 * tp.life, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // --- Drawing helpers ---
            function drawTrack(ctx) {
                // Outer glow ring
                const glowGrad = ctx.createRadialGradient(CX, CY, TRACK_RADIUS - 8, CX, CY, TRACK_RADIUS + 12);
                glowGrad.addColorStop(0, 'rgba(180,160,220,0.03)');
                glowGrad.addColorStop(0.5, 'rgba(180,140,200,0.12)');
                glowGrad.addColorStop(1, 'rgba(180,140,200,0)');
                ctx.strokeStyle = glowGrad;
                ctx.lineWidth = 20;
                ctx.beginPath();
                ctx.arc(CX, CY, TRACK_RADIUS, 0, Math.PI * 2);
                ctx.stroke();

                // Main track rings
                for (let ring = 0; ring < 2; ring++) {
                    const r = TRACK_RADIUS + (ring === 0 ? -5 : 5);
                    ctx.strokeStyle = ring === 0 ?
                        'rgba(200,180,220,0.25)' :
                        'rgba(180,160,200,0.18)';
                    ctx.lineWidth = ring === 0 ? 2.5 : 1.5;
                    ctx.setLineDash(ring === 0 ? [] : [8, 20]);
                    ctx.beginPath();
                    ctx.arc(CX, CY, r, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Subtle inner track
                ctx.strokeStyle = 'rgba(150,140,180,0.10)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 16]);
                ctx.beginPath();
                ctx.arc(CX, CY, TRACK_RADIUS - 14, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            function drawStation(ctx, station, isActive, flashAlpha) {
                const gc = gateColors[station.gateType];
                const baseRadius = 10;
                const pulseRadius = isActive ? baseRadius + 6 + Math.sin(globalTime * 8) * 4 : baseRadius;

                // Outer glow
                const glowGrad = ctx.createRadialGradient(station.x, station.y, baseRadius * 0.5, station.x, station.y,
                    pulseRadius * 3.5);
                const glowColor = gc.glow;
                glowGrad.addColorStop(0, glowColor.replace(')', ',0.7)').replace('rgb',
                    'rgba').replace('#', 'rgba(').replace(
                    /^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i,
                    (m, r, g, b) => `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
                // Simpler glow
                const alpha0 = isActive ? 0.8 : 0.3;
                const alpha1 = 0;
                glowGrad.addColorStop(0, gc.glow +
                    `,${(alpha0 + (flashAlpha || 0) * 0.6).toFixed(2)})`.replace('rgb', 'rgba').replace('#',
                        'rgba(').replace(
                        /^rgba\(([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})/i,
                        (m, r, g, b) =>
                        `rgba(${parseInt(r,16)},${parseInt(g,16)},${parseInt(b,16)}`);
                glowGrad.addColorStop(1, 'rgba(0,0,0,0)');

                // Actually let me just draw the glow simply
                ctx.save();
                const glowAlpha = (isActive ? 0.7 : 0.25) + (flashAlpha || 0) * 0.5;
                ctx.globalAlpha = Math.min(1, glowAlpha);
                ctx.fillStyle = gc.glow;
                ctx.shadowColor = gc.glow;
                ctx.shadowBlur = pulseRadius * 2.5;
                ctx.beginPath();
                ctx.arc(station.x, station.y, pulseRadius * 1.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // Station body
                const bodyGrad = ctx.createRadialGradient(station.x - 2, station.y - 2, baseRadius * 0.2, station.x,
                    station.y, baseRadius);
                bodyGrad.addColorStop(0, '#ffffff');
                bodyGrad.addColorStop(0.4, gc.main);
                bodyGrad.addColorStop(1, '#1a1a2e');
                ctx.fillStyle = bodyGrad;
                ctx.shadowColor = gc.main;
                ctx.shadowBlur = isActive ? 16 : 6;
                ctx.beginPath();
                ctx.arc(station.x, station.y, baseRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Ring around station
                ctx.strokeStyle = gc.main;
                ctx.lineWidth = 2;
                ctx.globalAlpha = isActive ? 0.9 : 0.5;
                ctx.beginPath();
                ctx.arc(station.x, station.y, baseRadius + 3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;

                // Gate indicator bars (small lines radiating from station)
                const barCount = station.gateType === 4 ? 6 : 4;
                for (let b = 0; b < barCount; b++) {
                    const ba = (b / barCount) * Math.PI * 2;
                    const innerR = baseRadius + 5;
                    const outerR = baseRadius + 14;
                    const bx1 = station.x + Math.cos(ba) * innerR;
                    const by1 = station.y + Math.sin(ba) * innerR;
                    const bx2 = station.x + Math.cos(ba) * outerR;
                    const by2 = station.y + Math.sin(ba) * outerR;
                    ctx.strokeStyle = gc.main;
                    ctx.lineWidth = 1.5;
                    ctx.globalAlpha = isActive ? 0.8 : 0.3;
                    ctx.beginPath();
                    ctx.moveTo(bx1, by1);
                    ctx.lineTo(bx2, by2);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;

                // Label
                ctx.fillStyle = '#e0d8f0';
                ctx.font = 'bold 11px "Segoe UI","Inter",system-ui,sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(station.label, station.labelX, station.labelY);

                // Small gate type indicator dot near label
                const dotX = station.labelX;
                const dotY = station.labelY - 14;
                ctx.fillStyle = gc.main;
                ctx.shadowColor = gc.glow;
                ctx.shadowBlur = 4;
                ctx.beginPath();
                ctx.arc(dotX, dotY, 3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function drawDossier(ctx, x, y, angle) {
                // Dossier as a document/folder shape
                const w = 16;
                const h = 20;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2); // Orient along track tangent

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(-w / 2 + 2, -h / 2 + 2, w, h);

                // Document body
                const docGrad = ctx.createLinearGradient(-w / 2, 0, w / 2, 0);
                docGrad.addColorStop(0, '#e8dcc8');
                docGrad.addColorStop(0.5, '#faf3e6');
                docGrad.addColorStop(1, '#d8c8a8');
                ctx.fillStyle = docGrad;
                ctx.fillRect(-w / 2, -h / 2, w, h);

                // Document border
                ctx.strokeStyle = '#b8a080';
                ctx.lineWidth = 1;
                ctx.strokeRect(-w / 2, -h / 2, w, h);

                // Fold corner
                ctx.fillStyle = '#d0c0a0';
                ctx.beginPath();
                ctx.moveTo(w / 2 - 5, -h / 2);
                ctx.lineTo(w / 2, -h / 2 + 5);
                ctx.lineTo(w / 2, -h / 2);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#b8a080';
                ctx.lineWidth = 0.8;
                ctx.stroke();

                // Lines on document
                ctx.strokeStyle = '#c8b898';
                ctx.lineWidth = 0.7;
                for (let ly = -4; ly <= 6; ly += 4) {
                    ctx.beginPath();
                    ctx.moveTo(-w / 2 + 4, ly);
                    ctx.lineTo(w / 2 - 4, ly);
                    ctx.stroke();
                }

                // Glow
                ctx.shadowColor = '#ffcc66';
                ctx.shadowBlur = 12;
                ctx.strokeStyle = 'rgba(255,200,120,0.5)';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(-w / 2 - 1, -h / 2 - 1, w + 2, h + 2);
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            // --- Find nearest upcoming station ---
            function getUpcomingStation(angle) {
                let normalized = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                let bestStation = null;
                let bestDist = Infinity;
                for (const st of stations) {
                    let sa = ((st.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    let dist = sa - normalized;
                    if (dist < -0.01) dist += Math.PI * 2;
                    if (dist >= -0.01 && dist < bestDist) {
                        bestDist = dist;
                        bestStation = st;
                    }
                }
                return { station: bestStation, distance: bestDist };
            }

            // --- Main animation ---
            let lastTime = performance.now();
            let rejectionLabelAlpha = 0;
            let rejectionLabelText = '';
            let rejectionLabelStation = null;

            function update(dt) {
                globalTime += dt;
                // Clamp dt
                if (dt > 0.1) dt = 0.1;
                if (dt <= 0) dt = 0.016;

                // Update cooldown
                if (cooldownTimer > 0) cooldownTimer -= dt;

                // Update shake decay
                if (shakeAmount > 0) shakeAmount = Math.max(0, shakeAmount - dt * 4);

                // Update rejection label
                if (rejectionLabelAlpha > 0) {
                    rejectionLabelAlpha -= dt * 1.2;
                    if (rejectionLabelAlpha < 0) rejectionLabelAlpha = 0;
                }

                // Determine speed based on proximity to upcoming station
                const upcoming = getUpcomingStation(dossierAngle);
                let targetSpeed = 0.0015; // fast travel
                if (upcoming.station && upcoming.distance < 0.25) {
                    // Slow down near station
                    const t = Math.max(0, upcoming.distance / 0.25);
                    const eased = t < 0.3 ? (t / 0.3) * 0.15 : 0.15 + (1 - 0.15) * ((t - 0.3) / 0.7);
                    targetSpeed = 0.00015 + eased * 0.00135;
                }
                // Smooth speed transition
                angularSpeed += (targetSpeed - angularSpeed) * Math.min(1, dt * 5);

                // Move dossier
                dossierAngle += angularSpeed * dt * 60;
                // Wrap angle
                while (dossierAngle > Math.PI * 2) dossierAngle -= Math.PI * 2;
                while (dossierAngle < 0) dossierAngle += Math.PI * 2;

                // Check if we passed a station
                const normalized = dossierAngle;
                for (const st of stations) {
                    const sa = ((st.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    const dist = Math.abs(normalized - sa);
                    const wrappedDist = Math.min(dist, Math.PI * 2 - dist);

                    // Trigger when very close to station and cooldown is done
                    if (wrappedDist < 0.06 && cooldownTimer <= 0 && lastStationTriggered !== st.index) {
                        // Check if this station was already visited this lap
                        const maskBit = 1 << st.index;
                        if (!(visitedMask & maskBit)) {
                            // Trigger gate!
                            visitedMask |= maskBit;
                            lastStationTriggered = st.index;
                            cooldownTimer = 0.6;
                            spawnParticles(st, st.gateType === 4 ? 60 : st.gateType === 3 ? 50 : 40);
                            rejectionFlash = { station: st, alpha: 1.0, startTime: globalTime };
                            rejectionLabelAlpha = 1.0;
                            rejectionLabelText = st.detail;
                            rejectionLabelStation = st;
                            if (st.gateType === 4) shakeAmount = 0.7;
                            if (st.gateType === 3) shakeAmount = 0.35;

                            // Update status tag
                            statusTag.classList.remove('flash');
                            void statusTag.offsetWidth;
                            statusTag.classList.add('flash');
                            statusTag.querySelector('.gate-name').textContent = st.gateName;
                            statusTag.querySelector('.gate-detail').textContent = st.fullDetail;
                            statusTag.style.borderColor = gateColors[st.gateType].main;
                            statusTag.style.boxShadow =
                                `0 4px 30px ${gateColors[st.gateType].glow}66`;

                            // Check if full lap completed
                            if (visitedMask === 0xFF) {
                                // All 8 stations visited
                                lapCount++;
                                visitedMask = 0;
                                dayCount += Math.floor(100 + Math.random() * 40);
                                // Extra particles at completion
                                for (const s of stations) {
                                    setTimeout(() => spawnParticles(s, 15), Math.random() * 800);
                                }
                            }
                        }
                    }
                    // Reset lastStationTriggered when far enough away
                    if (wrappedDist > 0.3 && lastStationTriggered === st.index && cooldownTimer <= 0) {
                        lastStationTriggered = -1;
                    }
                }

                // Accumulate days based on angular travel
                dayCount += angularSpeed * dt * 60 * 3.5;
                dayCountEl.textContent = Math.floor(dayCount);

                // Update rejection flash
                if (rejectionFlash) {
                    rejectionFlash.alpha -= dt * 2.5;
                    if (rejectionFlash.alpha <= 0) rejectionFlash = null;
                }

                // Update particles
                updateParticles(dt);

                // Update trail
                const dx = CX + TRACK_RADIUS * Math.cos(dossierAngle);
                const dy = CY + TRACK_RADIUS * Math.sin(dossierAngle);
                updateTrail(dx, dy);
            }

            function drawRejectionLabel(ctx) {
                if (!rejectionLabelStation || rejectionLabelAlpha <= 0) return;
                const st = rejectionLabelStation;
                const gc = gateColors[st.gateType];
                const lx = st.x;
                const ly = st.y - 38;
                const alpha = Math.min(1, rejectionLabelAlpha);

                ctx.save();
                ctx.globalAlpha = alpha;
                // Background pill
                const textWidth = ctx.measureText(rejectionLabelText).width;
                const pw = textWidth + 24;
                const ph = 22;
                ctx.fillStyle = 'rgba(10,10,20,0.85)';
                ctx.strokeStyle = gc.main;
                ctx.lineWidth = 1.5;
                ctx.shadowColor = gc.glow;
                ctx.shadowBlur = 16;
                ctx.beginPath();
                ctx.roundRect(lx - pw / 2, ly - ph / 2, pw, ph, 11);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Text
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px "Segoe UI","Inter",system-ui,sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(rejectionLabelText, lx, ly);
                ctx.restore();
            }

            function drawCenterLabel(ctx) {
                // Subtle center text
                ctx.fillStyle = 'rgba(180,170,200,0.35)';
                ctx.font = 'italic 13px "Segoe UI","Inter",system-ui,sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('THE REGULATORY', CX, CY - 12);
                ctx.fillText('CAROUSEL', CX, CY + 10);
                ctx.fillStyle = 'rgba(200,180,160,0.2)';
                ctx.font = '10px "Segoe UI","Inter",system-ui,sans-serif';
                ctx.fillText(`Lap ${lapCount + 1} • ${Math.floor(dayCount)} days`, CX, CY + 32);
            }

            function drawConnectionArrows(ctx) {
                // Draw subtle directional arrows between stations
                for (let i = 0; i < stations.length; i++) {
                    const curr = stations[i];
                    const next = stations[(i + 1) % stations.length];
                    const midAngle = (curr.angle + next.angle) / 2;
                    if (next.angle < curr.angle) midAngle += Math.PI;
                    // Normalize
                    let ma = midAngle;
                    while (ma > Math.PI * 2) ma -= Math.PI * 2;
                    while (ma < 0) ma += Math.PI * 2;
                    const mx = CX + TRACK_RADIUS * Math.cos(ma);
                    const my = CY + TRACK_RADIUS * Math.sin(ma);

                    // Small arrowhead
                    const arrowAngle = ma + Math.PI / 2; // tangent
                    const arrowSize = 7;
                    ctx.fillStyle = 'rgba(180,160,200,0.3)';
                    ctx.beginPath();
                    ctx.moveTo(mx + Math.cos(arrowAngle) * arrowSize, my + Math.sin(arrowAngle) * arrowSize);
                    ctx.lineTo(mx + Math.cos(arrowAngle + 2.4) * arrowSize * 0.7, my + Math.sin(arrowAngle + 2.4) *
                        arrowSize * 0.7);
                    ctx.lineTo(mx + Math.cos(arrowAngle - 2.4) * arrowSize * 0.7, my + Math.sin(arrowAngle - 2.4) *
                        arrowSize * 0.7);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            function render(timestamp) {
                const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
                lastTime = timestamp;
                if (dt > 0 && dt < 0.5) update(dt);

                ctx.clearRect(0, 0, SIZE, SIZE);

                // Apply subtle shake
                let sx = 0,
                    sy = 0;
                if (shakeAmount > 0.01) {
                    sx = (Math.random() - 0.5) * shakeAmount * 8;
                    sy = (Math.random() - 0.5) * shakeAmount * 8;
                }
                ctx.save();
                ctx.translate(sx, sy);

                // Background radial
                const bgGrad = ctx.createRadialGradient(CX, CY, 60, CX, CY, SIZE * 0.7);
                bgGrad.addColorStop(0, '#1a1a30');
                bgGrad.addColorStop(1, '#080812');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, SIZE, SIZE);

                // Draw track
                drawTrack(ctx);

                // Draw connection arrows
                drawConnectionArrows(ctx);

                // Determine which station is "active" (dossier nearby)
                let activeStationIndex = -1;
                const normalized = dossierAngle;
                let minDist = Infinity;
                for (let i = 0; i < stations.length; i++) {
                    const sa = ((stations[i].angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    const dist = Math.min(Math.abs(normalized - sa), Math.PI * 2 - Math.abs(normalized - sa));
                    if (dist < minDist) {
                        minDist = dist;
                        activeStationIndex = i;
                    }
                }

                // Draw stations
                const flashAlpha = rejectionFlash ? rejectionFlash.alpha : 0;
                for (let i = 0; i < stations.length; i++) {
                    const isActive = i === activeStationIndex && minDist < 0.25;
                    const isFlashing = rejectionFlash && rejectionFlash.station.index === i;
                    drawStation(ctx, stations[i], isActive, isFlashing ? flashAlpha : 0);
                }

                // Draw trail
                drawTrail(ctx);

                // Draw dossier
                const dx = CX + TRACK_RADIUS * Math.cos(dossierAngle);
                const dy = CY + TRACK_RADIUS * Math.sin(dossierAngle);
                const tangentAngle = dossierAngle + Math.PI / 2;
                // Glow underneath dossier
                const dossierGlow = ctx.createRadialGradient(dx, dy, 4, dx, dy, 22);
                dossierGlow.addColorStop(0, 'rgba(255,220,150,0.7)');
                dossierGlow.addColorStop(1, 'rgba(255,150,60,0)');
                ctx.fillStyle = dossierGlow;
                ctx.beginPath();
                ctx.arc(dx, dy, 22, 0, Math.PI * 2);
                ctx.fill();

                drawDossier(ctx, dx, dy, tangentAngle);

                // Draw particles
                drawParticles(ctx);

                // Draw rejection label
                drawRejectionLabel(ctx);

                // Draw center label
                drawCenterLabel(ctx);

                ctx.restore();

                // Draw vignette overlay
                const vignetteGrad = ctx.createRadialGradient(CX, CY, SIZE * 0.35, CX, CY, SIZE * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, SIZE, SIZE);

                requestAnimationFrame(render);
            }

            // --- Handle click on canvas to highlight stations ---
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mx = (e.clientX - rect.left) / scale;
                const my = (e.clientY - rect.top) / scale;
                for (const st of stations) {
                    const dist = Math.hypot(mx - st.x, my - st.y);
                    if (dist < 28) {
                        // Clicked on a station - show info
                        spawnParticles(st, 25);
                        rejectionLabelAlpha = 1.5;
                        rejectionLabelText = st.detail;
                        rejectionLabelStation = st;
                        statusTag.classList.remove('flash');
                        void statusTag.offsetWidth;
                        statusTag.classList.add('flash');
                        statusTag.querySelector('.gate-name').textContent = st.gateName;
                        statusTag.querySelector('.gate-detail').textContent = st.fullDetail;
                        statusTag.style.borderColor = gateColors[st.gateType].main;
                        statusTag.style.boxShadow = `0 4px 30px ${gateColors[st.gateType].glow}66`;
                        break;
                    }
                }
            });

            // --- Start ---
            // Initialize trail
            const initX = CX + TRACK_RADIUS * Math.cos(dossierAngle);
            const initY = CY + TRACK_RADIUS * Math.sin(dossierAngle);
            for (let i = 0; i < 20; i++) {
                trailPoints.push({ x: initX, y: initY, life: 0.2 + (i / 20) * 0.8 });
            }

            statusTag.querySelector('.gate-name').textContent = 'Starting...';
            statusTag.querySelector('.gate-detail').textContent = 'Dossier entering the regulatory carousel.';
            dayCountEl.textContent = '0';

            requestAnimationFrame(render);

            console.log('🔄 Regulatory Carousel initialized.');
            console.log('   Watch the dossier cycle endlessly through 8 gates.');
            console.log('   Click any station to see its gate mechanism details.');
            console.log('   Gate Types:');
            console.log('   🟠 Type 1: "Not Us" — Jurisdictional Deflection (CCMA, DEL, JSE)');
            console.log('   🟡 Type 2: "Not Best Placed" — Institutional Inertia (SAHRC, CMS)');
            console.log('   🟣 Type 3: "Null Space" — Technical Black Hole (HPCSA/SAPC/SANC)');
            console.log('   🔴 Type 4: "Hard Stop" — Active Obstruction (Labour Court, SAPS)');
        })();
    </script>
</body>
